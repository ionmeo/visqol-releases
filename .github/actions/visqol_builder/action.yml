name: visqol_builder

description: Build, test, and upload ViSQOL

inputs:
  platform:
    description: Host platform to build on
    required: true
  architecture:
    description: target architecture to build for
    required: true
    build-options:
      description: bazel build command options
      required: false
      default: ""

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        if [[ "${{inputs.platform}}" == "windows" ]]; then
          PYTHON_BIN=$(which python)
          export PYTHON_BIN_PATH="$PYTHON_BIN"
          echo "PYTHON_BIN_PATH=$PYTHON_BIN" >> $GITHUB_ENV
        fi
    - name: Setup MSVC (Windows)
      if: inputs.platform == 'windows'
      shell: pwsh
      run: |
        # Find VS installation and verify C++ tools
        $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $vsPath = & $vswhere -latest -property installationPath
        Write-Host "VS installation: $vsPath"
        $vcPath = "$vsPath\VC"
        Write-Host "VC path: $vcPath"
        # List what's in VC\Auxiliary\Build
        if (Test-Path "$vcPath\Auxiliary\Build\vcvarsall.bat") {
          Write-Host "vcvarsall.bat found"
        } else {
          Write-Host "vcvarsall.bat NOT found, installing C++ build tools..."
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe" modify `
            --installPath "$vsPath" `
            --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            --quiet --wait --norestart
        }
        echo "BAZEL_VC=$vcPath" >> $env:GITHUB_ENV
    - shell: bash
      run: |
        bazelisk test -c opt :all ${{inputs.build-options}}
    - shell: bash
      run: |
        if [[ "${{inputs.platform}}" != "windows" ]]; then
          bazelisk test -c opt python:all ${{inputs.build-options}}
        fi
    - shell: bash
      run: |
        bazelisk build -c opt :all ${{inputs.build-options}}
    - shell: bash
      run: |
        if [[ "${{inputs.platform}}" != "windows" ]]; then
          bazelisk build -c opt python:all ${{inputs.build-options}}
        fi
    - shell: bash
      run: |
        mkdir action-product
        cp bazel-bin/visqol action-product/
        if [[ "${{inputs.platform}}" != "windows" ]]; then
          cp bazel-bin/*_pb2.py action-product/
          cp bazel-bin/python/visqol_lib_py.so action-product/
        fi
        cp model/lattice_tcditugenmeetpackhref_ls2_nl60_lr12_bs2048_learn.005_ep2400_train1_7_raw.tflite action-product/
        cp model/libsvm_nu_svr_model.txt  action-product/
    - uses: actions/upload-artifact@v4
      with:
        name: visqol-${{ inputs.platform }}-${{ inputs.architecture }}
        path: action-product        
        
    
