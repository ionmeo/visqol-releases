name: release

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Label for this run'
        required: false
        default: ''
      tag:
        description: 'Release tag'
        required: true
      overwrite:
        description: 'Overwrite existing release'
        type: boolean
        default: false
      strategy:
        description: 'Artifact strategy'
        type: choice
        options:
          - 'latest-run'
          - 'latest-all-passed'
          - 'latest-per-platform'
        default: 'latest-run'

run-name: "${{ inputs.note || 'release' }}"

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PLATFORMS: "visqol-linux-amd64 visqol-linux-arm64 visqol-macos-amd64 visqol-macos-arm64 visqol-windows-amd64 visqol-windows-arm64"
    steps:
      - name: Checkout repo
        if: inputs.overwrite == true
        uses: actions/checkout@v6

      - name: Update tag to latest commit
        if: inputs.overwrite == true
        run: |
          git tag -f ${{ inputs.tag }}
          git push origin ${{ inputs.tag }} --force

      - name: Check existing release
        if: inputs.overwrite == false
        run: |
          if gh release view ${{ inputs.tag }} --repo $REPO 2>/dev/null; then
            echo "::error::Release ${{ inputs.tag }} already exists. Use overwrite=true to replace."
            exit 1
          fi

      - name: Collect artifacts (latest-run)
        if: inputs.strategy == 'latest-run'
        id: latest_run
        run: |
          RUN_ID=$(gh run list --repo $REPO --workflow=ci.yml --status=completed --limit=1 --json databaseId -q '.[0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "::error::No completed build runs found"
            exit 1
          fi
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Collect artifacts (latest-all-passed)
        if: inputs.strategy == 'latest-all-passed'
        id: all_passed
        run: |
          RUNS=$(gh run list --repo $REPO --workflow=ci.yml --status=success --limit=20 --json databaseId -q '.[].databaseId')
          for RUN_ID in $RUNS; do
            NAMES=$(gh api repos/$REPO/actions/runs/$RUN_ID/artifacts --jq '.artifacts[].name' | sort)
            ALL=true
            for P in $PLATFORMS; do
              echo "$NAMES" | grep -q "^${P}$" || { ALL=false; break; }
            done
            if [ "$ALL" = true ]; then
              echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
              echo "Found run with all 6 artifacts: $RUN_ID"
              exit 0
            fi
          done
          echo "::error::No run with all 6 artifacts in the last 20 runs"
          exit 1

      - name: Collect artifacts (latest-per-platform)
        if: inputs.strategy == 'latest-per-platform'
        id: per_platform
        run: |
          RUNS=$(gh run list --repo $REPO --workflow=ci.yml --status=completed --limit=20 --json databaseId -q '.[].databaseId')
          DOWNLOADS=""
          MISSING=""
          for P in $PLATFORMS; do
            FOUND=false
            for RUN_ID in $RUNS; do
              if gh api repos/$REPO/actions/runs/$RUN_ID/artifacts --jq ".artifacts[].name" | grep -q "^${P}$"; then
                echo "$P -> run $RUN_ID"
                DOWNLOADS="$DOWNLOADS $P:$RUN_ID"
                FOUND=true
                break
              fi
            done
            [ "$FOUND" = false ] && MISSING="$MISSING $P"
          done
          [ -n "$MISSING" ] && echo "::warning::Missing artifacts for:$MISSING"
          echo "downloads=$DOWNLOADS" >> $GITHUB_OUTPUT

      - name: Download artifacts
        run: |
          mkdir -p artifacts
          if [ "${{ inputs.strategy }}" = "latest-per-platform" ]; then
            for ENTRY in ${{ steps.per_platform.outputs.downloads }}; do
              PLATFORM="${ENTRY%%:*}"
              RUN_ID="${ENTRY##*:}"
              echo "Downloading $PLATFORM from run $RUN_ID..."
              gh run download $RUN_ID --repo $REPO --name "$PLATFORM" --dir "artifacts/$PLATFORM"
            done
          else
            RUN_ID="${{ steps.latest_run.outputs.run_id }}${{ steps.all_passed.outputs.run_id }}"
            echo "Downloading from run $RUN_ID..."
            gh run download $RUN_ID --repo $REPO --dir artifacts
          fi
          ls artifacts/

      - name: Create zips
        run: |
          cd artifacts
          for dir in */; do
            zip -r "../${dir%/}.zip" "$dir"
          done

      - name: Upload to existing release
        if: inputs.overwrite == true
        run: |
          if gh release view ${{ inputs.tag }} --repo $REPO &>/dev/null; then
            gh release upload ${{ inputs.tag }} *.zip --clobber --repo $REPO
          else
            gh release create ${{ inputs.tag }} *.zip --repo $REPO --title "${{ inputs.tag }}"
          fi

      - name: Create new release
        if: inputs.overwrite == false
        run: gh release create ${{ inputs.tag }} *.zip --repo $REPO --title "${{ inputs.tag }}"
